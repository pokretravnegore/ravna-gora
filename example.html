<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PDF Viewer</title>
<style>
  :root {
    --bg: #1a1a1a;
    --toolbar-bg: #262626;
    --toolbar-border: #333;
    --text: #e5e5e5;
    --text-dim: #888;
    --accent: #4a9eff;
    --button-hover: #333;
    --page-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }

  /* Disable text selection on UI to feel app-like */
  .toolbar, .drop-zone {
    user-select: none;
    -webkit-user-select: none;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--toolbar-border);
    height: 48px;
    flex-shrink: 0;
  }

  .toolbar button {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.15s;
  }

  .toolbar button:hover:not(:disabled) {
    background: var(--button-hover);
  }

  .toolbar button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .toolbar .page-info {
    font-size: 13px;
    color: var(--text-dim);
    min-width: 100px;
    text-align: center;
  }

  .toolbar .page-info input {
    width: 40px;
    background: var(--bg);
    border: 1px solid var(--toolbar-border);
    color: var(--text);
    padding: 2px 4px;
    border-radius: 3px;
    text-align: center;
    font-size: 13px;
  }

  .toolbar .spacer { flex: 1; }

  .toolbar .zoom-info {
    font-size: 13px;
    color: var(--text-dim);
    min-width: 50px;
    text-align: center;
  }

  .viewer-container {
    flex: 1;
    overflow: auto;
    position: relative;
    background: var(--bg);
  }

  .viewer-container::-webkit-scrollbar { width: 12px; height: 12px; }
  .viewer-container::-webkit-scrollbar-track { background: var(--bg); }
  .viewer-container::-webkit-scrollbar-thumb { background: #444; border-radius: 6px; }
  .viewer-container::-webkit-scrollbar-thumb:hover { background: #555; }

  .pages-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    gap: 16px;
    min-height: 100%;
  }

  .pdf-page {
    box-shadow: var(--page-shadow);
    background: white;
    /* Disable image saving via drag */
    -webkit-user-drag: none;
    user-select: none;
  }

  .drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-dim);
    pointer-events: none;
  }

  .drop-zone.active {
    pointer-events: auto;
    background: rgba(74, 158, 255, 0.05);
    border: 2px dashed var(--accent);
    color: var(--accent);
  }

  .drop-zone .title {
    font-size: 18px;
    color: var(--text);
  }

  .drop-zone .subtitle {
    font-size: 13px;
  }

  .drop-zone label {
    pointer-events: auto;
    background: var(--accent);
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: opacity 0.15s;
  }

  .drop-zone label:hover { opacity: 0.9; }

  .drop-zone input[type="file"] { display: none; }

  .loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--text-dim);
    font-size: 14px;
  }

  .icon {
    width: 16px;
    height: 16px;
    fill: currentColor;
    vertical-align: middle;
  }

  /* Block right-click menu visually (also blocked via JS) */
  .pdf-page { -webkit-touch-callout: none; }
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <button id="prev" title="Previous page (←)" disabled>‹ Prev</button>
    <div class="page-info">
      <input id="page-num" type="number" min="1" value="1" disabled />
      <span>/ <span id="page-count">–</span></span>
    </div>
    <button id="next" title="Next page (→)" disabled>Next ›</button>

    <div class="spacer"></div>

    <button id="zoom-out" title="Zoom out (−)" disabled>−</button>
    <span class="zoom-info" id="zoom-level">–</span>
    <button id="zoom-in" title="Zoom in (+)" disabled>+</button>
    <button id="fit-width" title="Fit to width" disabled>Fit</button>
  </div>

  <div class="viewer-container" id="viewer-container">
    <div class="pages-wrapper" id="pages-wrapper"></div>

    <div class="drop-zone" id="drop-zone">
      <div class="title">Open a PDF to begin</div>
      <div class="subtitle">Drop a file here, or</div>
      <label for="file-input">Choose PDF</label>
      <input type="file" id="file-input" accept="application/pdf" />
    </div>
  </div>
</div>

<script type="module">
  // PDF.js loaded from jsDelivr CDN — works offline once cached.
  // For production self-hosting, swap these URLs for your own paths.
  import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.min.mjs';

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs';

  const state = {
    pdf: null,
    currentPage: 1,
    scale: 1.25,
    pages: new Map(), // pageNum -> rendered canvas wrapper
  };

  const els = {
    prev: document.getElementById('prev'),
    next: document.getElementById('next'),
    pageNum: document.getElementById('page-num'),
    pageCount: document.getElementById('page-count'),
    zoomIn: document.getElementById('zoom-in'),
    zoomOut: document.getElementById('zoom-out'),
    zoomLevel: document.getElementById('zoom-level'),
    fitWidth: document.getElementById('fit-width'),
    container: document.getElementById('viewer-container'),
    wrapper: document.getElementById('pages-wrapper'),
    dropZone: document.getElementById('drop-zone'),
    fileInput: document.getElementById('file-input'),
  };

  // ---------- Loading ----------

  async function loadPdf(source) {
    // source can be: URL string, ArrayBuffer, or {data: Uint8Array}
    els.dropZone.style.display = 'none';
    els.wrapper.innerHTML = '<div class="loading">Loading…</div>';

    try {
      const loadingTask = pdfjsLib.getDocument(source);
      state.pdf = await loadingTask.promise;
      state.currentPage = 1;
      state.pages.clear();

      els.wrapper.innerHTML = '';
      els.pageCount.textContent = state.pdf.numPages;
      els.pageNum.max = state.pdf.numPages;
      els.pageNum.value = 1;

      enableControls(true);
      await renderAllPages();
    } catch (err) {
      console.error('Failed to load PDF:', err);
      els.wrapper.innerHTML = '<div class="loading">Failed to load PDF</div>';
    }
  }

  function enableControls(enabled) {
    [els.prev, els.next, els.pageNum, els.zoomIn, els.zoomOut, els.fitWidth]
      .forEach(el => el.disabled = !enabled);
  }

  // ---------- Rendering ----------

  async function renderAllPages() {
    for (let i = 1; i <= state.pdf.numPages; i++) {
      await renderPage(i);
    }
    updateZoomDisplay();
  }

  async function renderPage(pageNum) {
    const page = await state.pdf.getPage(pageNum);
    const viewport = page.getViewport({ scale: state.scale });

    const canvas = document.createElement('canvas');
    canvas.className = 'pdf-page';
    canvas.dataset.pageNum = pageNum;

    // Use devicePixelRatio for sharpness on hi-DPI displays
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(viewport.width * dpr);
    canvas.height = Math.floor(viewport.height * dpr);
    canvas.style.width = `${Math.floor(viewport.width)}px`;
    canvas.style.height = `${Math.floor(viewport.height)}px`;

    const ctx = canvas.getContext('2d');
    const transform = dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null;

    await page.render({
      canvasContext: ctx,
      viewport,
      transform,
    }).promise;

    els.wrapper.appendChild(canvas);
    state.pages.set(pageNum, canvas);
  }

  async function rerenderAtNewScale() {
    els.wrapper.innerHTML = '';
    state.pages.clear();
    await renderAllPages();
    scrollToPage(state.currentPage);
  }

  // ---------- Navigation ----------

  function scrollToPage(pageNum) {
    const canvas = state.pages.get(pageNum);
    if (canvas) {
      canvas.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    state.currentPage = pageNum;
    els.pageNum.value = pageNum;
  }

  function goPrev() {
    if (state.currentPage > 1) scrollToPage(state.currentPage - 1);
  }

  function goNext() {
    if (state.currentPage < state.pdf.numPages) scrollToPage(state.currentPage + 1);
  }

  // Detect which page is currently visible
  els.container.addEventListener('scroll', () => {
    if (!state.pdf) return;
    const containerTop = els.container.scrollTop;
    const containerMid = containerTop + els.container.clientHeight / 2;

    for (const [pageNum, canvas] of state.pages) {
      const top = canvas.offsetTop;
      const bottom = top + canvas.offsetHeight;
      if (containerMid >= top && containerMid <= bottom) {
        if (state.currentPage !== pageNum) {
          state.currentPage = pageNum;
          els.pageNum.value = pageNum;
        }
        break;
      }
    }
  });

  // ---------- Zoom ----------

  function setScale(newScale) {
    state.scale = Math.max(0.25, Math.min(5, newScale));
    rerenderAtNewScale();
  }

  function zoomIn() { setScale(state.scale * 1.2); }
  function zoomOut() { setScale(state.scale / 1.2); }

  function fitWidth() {
    if (!state.pdf) return;
    state.pdf.getPage(state.currentPage).then(page => {
      const viewport = page.getViewport({ scale: 1 });
      const containerWidth = els.container.clientWidth - 40; // padding allowance
      setScale(containerWidth / viewport.width);
    });
  }

  function updateZoomDisplay() {
    els.zoomLevel.textContent = `${Math.round(state.scale * 100)}%`;
  }

  // ---------- Event wiring ----------

  els.prev.addEventListener('click', goPrev);
  els.next.addEventListener('click', goNext);
  els.zoomIn.addEventListener('click', () => { zoomIn(); updateZoomDisplay(); });
  els.zoomOut.addEventListener('click', () => { zoomOut(); updateZoomDisplay(); });
  els.fitWidth.addEventListener('click', fitWidth);

  els.pageNum.addEventListener('change', () => {
    const n = parseInt(els.pageNum.value, 10);
    if (n >= 1 && n <= state.pdf.numPages) scrollToPage(n);
  });

  // File input + drag/drop
  els.fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) loadFromFile(file);
  });

  let dragCounter = 0;
  document.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    els.dropZone.style.display = 'flex';
    els.dropZone.classList.add('active');
  });
  document.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter === 0) {
      els.dropZone.classList.remove('active');
      if (state.pdf) els.dropZone.style.display = 'none';
    }
  });
  document.addEventListener('dragover', (e) => e.preventDefault());
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    els.dropZone.classList.remove('active');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') {
      loadFromFile(file);
    } else if (state.pdf) {
      els.dropZone.style.display = 'none';
    }
  });

  function loadFromFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => loadPdf({ data: new Uint8Array(e.target.result) });
    reader.readAsArrayBuffer(file);
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (!state.pdf) return;
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); goPrev(); }
    else if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); goNext(); }
    else if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomIn(); updateZoomDisplay(); }
    else if (e.key === '-') { e.preventDefault(); zoomOut(); updateZoomDisplay(); }
  });

  // ---------- Anti-download hardening ----------

  // Block right-click context menu on rendered pages
  document.addEventListener('contextmenu', (e) => {
    if (e.target.closest('.pdf-page')) e.preventDefault();
  });

  // Block Ctrl+S / Ctrl+P / Ctrl+Shift+S
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'p')) {
      e.preventDefault();
    }
  });

  // ---------- Optional: auto-load a PDF placed next to this file ----------
  // To serve a specific file, set this to your PDF path or pass ?file=foo.pdf in the URL.
  const urlParams = new URLSearchParams(window.location.search);
  const fileParam = urlParams.get('file');
  if (fileParam) {
    loadPdf(fileParam);
  }
</script>
</body>
</html>
